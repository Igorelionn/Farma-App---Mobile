name: suevit_app
description: Aplicativo oficial da Suevit - Plataforma B2B para pedidos de medicamentos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  
  # UI & Images
  cached_network_image: ^3.3.0
  google_fonts: ^6.3.3
  flutter_svg: ^2.0.9
  
  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  
  # Navigation
  go_router: ^17.0.1
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # Voice Recognition
  speech_to_text: ^7.0.0
  permission_handler: ^12.0.1
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/data/
    - assets/icons/

