name: suevit_app
description: Aplicativo oficial da Suevit - Plataforma B2B para pedidos de medicamentos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Backend
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.1
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  
  # UI & Images
  cached_network_image: ^3.3.0
  google_fonts: ^6.3.3
  flutter_svg: ^2.0.9
  
  # Utilities
  intl: ^0.20.2
  http: ^1.2.0
  file_picker: ^8.1.2
  url_launcher: ^6.3.0
  
  # Payment Gateway
  mercado_pago_mobile_checkout: ^2.0.0
  qr_flutter: ^4.1.0
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # Voice Recognition
  speech_to_text: ^7.0.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/data/
    - assets/icons/
    - public/
  
  fonts:
    - family: Folio Medium
      fonts:
        - asset: assets/fonts/FolioMedium.otf
          weight: 500
    - family: Mona Sans
      fonts:
        - asset: assets/fonts/Mona-Sans-Regular.otf
          weight: 400
