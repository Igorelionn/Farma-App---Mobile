<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha - Suevit</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      max-width: 440px;
      width: 100%;
      padding: 48px 40px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo img {
      max-width: 160px;
      height: auto;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 15px;
      color: #6B7280;
      text-align: center;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      font-family: Helvetica, Arial, sans-serif;
      background: #F7F8FA;
      border: 2px solid transparent;
      border-radius: 12px;
      transition: all 0.2s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #11F2D4;
      background: white;
    }

    .error {
      color: #EF4444;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }

    .error.show {
      display: block;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      color: #020B21;
      background: linear-gradient(135deg, #11F2D4 0%, #0dd4b8 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(17,242,212,0.2);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(17,242,212,0.3);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .success {
      text-align: center;
      display: none;
    }

    .success.show {
      display: block;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: #10B981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .success-icon svg {
      width: 32px;
      height: 32px;
      stroke: white;
      stroke-width: 3;
    }

    .success-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .success-text {
      font-size: 15px;
      color: #6B7280;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://klepqdiqpochlkrfyapd.supabase.co/storage/v1/object/public/public-assets/logo.png" alt="Suevit">
    </div>

    <div id="form-container">
      <h1>Nova senha</h1>
      <p class="subtitle">Digite sua nova senha abaixo</p>

      <form id="reset-form">
        <div class="form-group">
          <label for="password">Nova senha</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Digite sua nova senha" required>
          </div>
          <div class="error" id="password-error">A senha deve ter pelo menos 6 caracteres</div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirmar senha</label>
          <div class="input-wrapper">
            <input type="password" id="confirm-password" placeholder="Confirme sua nova senha" required>
          </div>
          <div class="error" id="confirm-error">As senhas não coincidem</div>
        </div>

        <button type="submit" id="submit-btn">Redefinir senha</button>
      </form>
    </div>

    <div class="success" id="success-container">
      <div class="success-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <div class="success-title">Senha redefinida!</div>
      <p class="success-text">Sua senha foi atualizada com sucesso. Você já pode fazer login com sua nova senha.</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://klepqdiqpochlkrfyapd.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsZXBxZGlxcG9jaGxrcmZ5YXBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTAzMDUsImV4cCI6MjA4ODA4NjMwNX0.9Kc4LYR9xaPxBwUdXj9RXRJOgV-mnexCmdDRQ7PAbyc';

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('reset-form');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm-password');
    const submitBtn = document.getElementById('submit-btn');
    const passwordError = document.getElementById('password-error');
    const confirmError = document.getElementById('confirm-error');
    const formContainer = document.getElementById('form-container');
    const successContainer = document.getElementById('success-container');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = passwordInput.value;
      const confirm = confirmInput.value;

      // Validação
      passwordError.classList.remove('show');
      confirmError.classList.remove('show');

      if (password.length < 6) {
        passwordError.classList.add('show');
        return;
      }

      if (password !== confirm) {
        confirmError.classList.add('show');
        return;
      }

      // Atualizar senha
      submitBtn.disabled = true;
      submitBtn.textContent = 'Atualizando...';

      try {
        const { error } = await supabaseClient.auth.updateUser({
          password: password
        });

        if (error) throw error;

        // Sucesso
        formContainer.style.display = 'none';
        successContainer.classList.add('show');

        // Redirecionar após 3 segundos
        setTimeout(() => {
          window.close();
        }, 3000);
      } catch (error) {
        alert('Erro ao atualizar senha. Por favor, tente novamente.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Redefinir senha';
      }
    });
  </script>
</body>
</html>
